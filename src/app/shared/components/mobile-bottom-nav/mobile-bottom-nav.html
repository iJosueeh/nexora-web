<nav class="mobile-bottom-nav" aria-label="Navegación principal móvil">
  <ul class="mobile-bottom-nav-list">
    <li>
      <a
        routerLink="/feed"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="mobile-bottom-nav-item"
        aria-label="Inicio"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span class="mobile-bottom-nav-label">Inicio</span>
      </a>
    </li>

    <li>
      <a
        routerLink="/feed/explore"
        routerLinkActive="is-active"
        class="mobile-bottom-nav-item"
        aria-label="Explorar"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <span class="mobile-bottom-nav-label">Explorar</span>
      </a>
    </li>

    <li class="mobile-bottom-nav-create">
      <button
        type="button"
        (click)="goToPublication($event)"
        class="mobile-bottom-nav-fab"
        aria-label="Crear publicación"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </li>

    <li>
      <a
        routerLink="/feed/notifications"
        routerLinkActive="is-active"
        class="mobile-bottom-nav-item"
        aria-label="Notificaciones"
      >
        <div class="mobile-bottom-nav-icon-wrapper">
          <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
            <path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"></path>
            <path d="M13.73 21a2 2 0 0 1-3.46 0"></path>
          </svg>
          @if (unreadCount() > 0) {
            <span class="mobile-bottom-nav-badge">{{ unreadCount() > 99 ? '99+' : unreadCount() }}</span>
          }
        </div>
        <span class="mobile-bottom-nav-label">Alertas</span>
      </a>
    </li>

    <li>
      <a
        [routerLink]="profileLink()"
        (click)="goToProfile($event)"
        routerLinkActive="is-active"
        class="mobile-bottom-nav-item"
        aria-label="Perfil"
      >
        <div class="mobile-bottom-nav-avatar">
          <img [src]="userAvatar()" alt="Mi perfil" />
        </div>
        <span class="mobile-bottom-nav-label">Perfil</span>
      </a>
    </li>
  </ul>
</nav>
