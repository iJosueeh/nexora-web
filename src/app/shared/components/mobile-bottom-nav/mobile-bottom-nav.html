<nav class="mobile-bottom-nav" aria-label="Navegación principal móvil">
  <ul class="mobile-bottom-nav-list">
    <li>
      <a
        routerLink="/feed"
        routerLinkActive="is-active"
        [routerLinkActiveOptions]="{ exact: true }"
        class="mobile-bottom-nav-item"
        aria-label="Inicio"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path>
          <polyline points="9 22 9 12 15 12 15 22"></polyline>
        </svg>
        <span class="mobile-bottom-nav-label">Inicio</span>
      </a>
    </li>

    <li>
      <a
        routerLink="/explorar"
        routerLinkActive="is-active"
        class="mobile-bottom-nav-item"
        aria-label="Explorar"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="11" cy="11" r="8"></circle>
          <path d="m21 21-4.35-4.35"></path>
        </svg>
        <span class="mobile-bottom-nav-label">Explorar</span>
      </a>
    </li>

    <li class="mobile-bottom-nav-create">
      <button
        type="button"
        (click)="goToPublication($event)"
        class="mobile-bottom-nav-fab"
        aria-label="Crear publicación"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
          <line x1="12" y1="5" x2="12" y2="19"></line>
          <line x1="5" y1="12" x2="19" y2="12"></line>
        </svg>
      </button>
    </li>

    <li>
      <a
        routerLink="/eventos"
        routerLinkActive="is-active"
        class="mobile-bottom-nav-item"
        aria-label="Eventos"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <rect x="3" y="4" width="18" height="18" rx="2" ry="2"></rect>
          <line x1="16" y1="2" x2="16" y2="6"></line>
          <line x1="8" y1="2" x2="8" y2="6"></line>
          <line x1="3" y1="10" x2="21" y2="10"></line>
        </svg>
        <span class="mobile-bottom-nav-label">Eventos</span>
      </a>
    </li>

    <li class="more-menu-container">
      <button
        type="button"
        (click)="toggleMoreMenu()"
        class="mobile-bottom-nav-item"
        [class.is-active]="isMoreMenuOpen()"
        aria-label="Más opciones"
        aria-haspopup="true"
        [attr.aria-expanded]="isMoreMenuOpen()"
      >
        <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <circle cx="12" cy="5" r="1"></circle>
          <circle cx="19" cy="5" r="1"></circle>
          <circle cx="5" cy="5" r="1"></circle>
          <circle cx="12" cy="12" r="1"></circle>
          <circle cx="19" cy="12" r="1"></circle>
          <circle cx="5" cy="12" r="1"></circle>
          <circle cx="12" cy="19" r="1"></circle>
          <circle cx="19" cy="19" r="1"></circle>
          <circle cx="5" cy="19" r="1"></circle>
        </svg>
        <span class="mobile-bottom-nav-label">Más</span>
      </button>

      @if (isMoreMenuOpen()) {
        <div class="more-menu-popup" role="menu">
          <div class="more-menu-header">
            <div class="more-menu-avatar">
              <img [src]="userAvatar()" alt="Avatar" />
            </div>
            <div class="more-menu-user">
              <span class="more-menu-name">{{ profileLink().length > 1 ? profileLink()[1] : 'Mi cuenta' }}</span>
            </div>
          </div>

          <div class="more-menu-divider"></div>

          <nav class="more-menu-nav">
            <a
              [routerLink]="profileLink()"
              (click)="closeMoreMenu()"
              class="more-menu-item"
              role="menuitem"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M20 21v-2a4 4 0 0 0-4-4H8a4 4 0 0 0-4 4v2"></path>
                <circle cx="12" cy="7" r="4"></circle>
              </svg>
              <span>Mi Perfil</span>
            </a>

            <a
              routerLink="/pulse"
              (click)="closeMoreMenu()"
              class="more-menu-item"
              role="menuitem"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M22 12h-4l-3 9L9 3l-3 9H2"></path>
              </svg>
              <span>Pulse</span>
            </a>

            <a
              routerLink="/feed/explore"
              (click)="closeMoreMenu()"
              class="more-menu-item"
              role="menuitem"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <polyline points="22 7 13.5 15.5 8.5 10.5 2 17"></polyline>
                <polyline points="16 7 22 7 22 13"></polyline>
              </svg>
              <span>Tendencias</span>
            </a>

            <a
              routerLink="/settings"
              (click)="closeMoreMenu()"
              class="more-menu-item"
              role="menuitem"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <circle cx="12" cy="12" r="3"></circle>
                <path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06A1.65 1.65 0 0 0 4.68 15a1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06A1.65 1.65 0 0 0 9 4.68a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path>
              </svg>
              <span>Ajustes</span>
            </a>
          </nav>

          <div class="more-menu-divider"></div>

          <div class="more-menu-footer">
            <button
              type="button"
              (click)="signOut()"
              class="more-menu-item more-menu-logout"
              role="menuitem"
            >
              <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path>
                <polyline points="16 17 21 12 16 7"></polyline>
                <line x1="21" y1="12" x2="9" y2="12"></line>
              </svg>
              <span>Cerrar Sesión</span>
            </button>
          </div>
        </div>
      }
    </li>
  </ul>
</nav>
