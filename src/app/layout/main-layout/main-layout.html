<div class="flex min-h-screen flex-col bg-[#06080d]">
  <app-navbar></app-navbar>

  <div class="flex-1 flex pt-14 md:pt-[3.5rem]">
    <main class="flex-1 main-content-area">
      <router-outlet></router-outlet>
    </main>
  </div>

  @if (shouldShowBottomNav()) {
    <app-mobile-bottom-nav />
  }

  @if (shouldShowFooter()) {
    @defer (on viewport) {
      <app-footer></app-footer>
    } @placeholder {
      <div class="h-48 bg-[#0d0d0d]"></div>
    }
  }
</div>
