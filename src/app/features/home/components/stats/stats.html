<section class="bg-[#12141b] px-4 py-16 md:px-10 md:py-20 lg:px-14 lg:py-24">

  <div class="mx-auto flex w-full max-w-6xl flex-col items-center justify-center divide-y divide-white/10 md:flex-row md:divide-x md:divide-y-0">

    @for (stat of stats(); track stat.id) {
      <div class="flex min-h-28 w-full flex-col items-center justify-center gap-2 py-6 md:min-h-24 md:px-14 md:py-0 lg:px-20">

        <!-- Number -->
        <div
          class="text-4xl font-light leading-none tracking-tight text-[#f0f2f7] md:text-5xl lg:text-[3.2rem]"
          style="font-family: 'Inter', sans-serif;"
        >
          <span [style.color]="stat.highlight ? '#f3a49f' : '#f0f2f7'">{{ stat.value }}</span>
        </div>

        <!-- Label -->
        <p class="text-[0.6rem] font-semibold uppercase tracking-[0.32em] text-[#9196a2] md:text-[0.62rem]">
          {{ stat.label }}
        </p>

      </div>
    }

  </div>

</section>
