<section
  #statsSection
  class="relative overflow-hidden border-y border-white/[0.04] bg-[#0c0d12] px-4 py-16 md:px-10 md:py-20 lg:px-14 lg:py-24"
>
  <!-- Orbs -->
  <div class="pointer-events-none absolute left-1/3 top-0 h-48 w-48 -translate-x-1/2 rounded-full bg-[#df3432]/5 blur-[100px]"></div>
  <div class="pointer-events-none absolute right-1/4 bottom-0 h-40 w-40 rounded-full bg-[#6366f1]/5 blur-[80px]"></div>

  <div
    class="relative z-10 mx-auto flex w-full max-w-6xl flex-col items-center justify-center divide-y divide-white/[0.06] rounded-2xl border border-white/[0.04] bg-white/[0.02] px-6 py-8 backdrop-blur-sm md:flex-row md:divide-x md:divide-y-0 md:px-0 md:py-0"
  >
    @for (stat of stats(); track stat.id; let i = $index) {
      <div class="flex min-h-28 w-full flex-col items-center justify-center gap-2 py-6 md:min-h-28 md:px-10 md:py-0 lg:px-16">
        <!-- Animated number -->
        <div
          class="text-4xl font-light leading-none tracking-tight md:text-5xl lg:text-[3.2rem]"
          style="font-family: 'Inter', sans-serif"
          [style.color]="stat.highlight ? '#f3a49f' : '#f1f5f9'"
        >
          @if (stat.numericValue >= 1000) {
            {{ (displayValues()[i] / 1000).toFixed(1) }}<span class="text-[0.6em]">{{ stat.suffix }}</span>
          } @else {
            {{ displayValues()[i] }}<span class="text-[0.6em]">{{ stat.suffix }}</span>
          }
        </div>

        <!-- Label -->
        <p class="text-[0.6rem] font-semibold uppercase tracking-[0.32em] text-slate-500 md:text-[0.62rem]">
          {{ stat.label }}
        </p>
      </div>
    }
  </div>
</section>
