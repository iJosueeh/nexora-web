<section class="relative flex min-h-screen flex-col justify-center overflow-hidden bg-[#0a0b0f] px-4 pb-12 pt-24 text-center md:px-8 md:pt-28 lg:px-12 lg:pt-32">
  <!-- Scroll progress bar -->
  <div
    class="fixed left-0 top-0 z-50 h-0.5 bg-gradient-to-r from-[#df3432] to-[#6366f1] transition-[width] duration-150 ease-out"
    [style.width.%]="scrollProgress()"
  ></div>

  <!-- Background gradient base -->
  <div class="absolute inset-0 bg-gradient-to-br from-[#0a0b0f] via-[#0f1117] to-[#0a0b0f]"></div>

  <!-- Decorative orbs -->
  <div class="pointer-events-none absolute -left-32 top-1/4 h-96 w-96 rounded-full bg-[#df3432]/10 blur-[120px]"></div>
  <div class="pointer-events-none absolute -right-32 bottom-1/4 h-80 w-80 rounded-full bg-[#6366f1]/10 blur-[100px]"></div>

  <!-- Bottom fade -->
  <div class="pointer-events-none absolute bottom-0 left-0 right-0 h-40 bg-gradient-to-t from-[#0a0b0f] to-transparent"></div>

  <!-- Main content -->
  <div
    class="relative z-10 mx-auto w-full max-w-4xl px-4 transition-all duration-[800ms] ease-[cubic-bezier(0.16,1,0.3,1)] md:px-6"
    [class.opacity-0]="!isContentVisible()"
    [class.-translate-y-8]="!isContentVisible()"
    [class.opacity-100]="isContentVisible()"
    [class.translate-y-0]="isContentVisible()"
  >
    <!-- Glass panel -->
    <div class="rounded-3xl border border-white/10 bg-white/[0.03] px-6 py-14 backdrop-blur-xl md:px-10 md:py-18 lg:px-14 lg:py-22">
      <!-- Pill badge -->
      <span
        class="mb-6 inline-block rounded-full border border-white/10 bg-white/[0.03] px-4 py-1.5 text-[0.6rem] font-semibold uppercase tracking-[0.28em] text-[#6366f1] backdrop-blur-sm"
      >
        Red Académica UTP
      </span>

      <!-- Title -->
      <h1 class="text-6xl font-black leading-none tracking-tight md:text-7xl lg:text-8xl" style="font-family: 'Inter', sans-serif">
        <span class="text-white drop-shadow-[0_0_30px_rgba(255,255,255,0.3)]">Nex</span>
        <span class="text-[#df3432]">ora</span>
      </h1>

      <!-- Subtitle -->
      <p
        class="mx-auto mt-5 max-w-2xl text-balance text-base leading-relaxed text-slate-400 md:text-lg lg:text-[1.38rem]"
      >
        Conecta, investiga y trasciende dentro de la comunidad UTP. Una
        experiencia editorial de alto nivel para el académico moderno.
      </p>

      <!-- CTAs -->
      <div class="mt-8 flex flex-wrap items-center justify-center gap-4">
        <a
          routerLink="/register"
          class="inline-flex min-w-[12.6rem] items-center justify-center gap-2 rounded-2xl bg-[#df3432] px-8 py-4 text-xs font-bold uppercase tracking-[0.15em] text-white transition-all duration-300 hover:scale-105 hover:shadow-[0_0_40px_rgba(223,52,46,0.5)] md:min-w-54"
        >
          Unirse al Nexo
        </a>
        <a
          routerLink="/explorar"
          class="inline-flex items-center gap-2 rounded-2xl border border-white/20 bg-white/5 px-8 py-4 text-xs font-semibold uppercase tracking-[0.14em] text-slate-300 backdrop-blur-sm transition-all duration-300 hover:scale-105 hover:border-white/30 hover:bg-white/10"
        >
          Explorar Investigación
        </a>
      </div>
    </div>
  </div>

  <!-- Scroll indicator -->
  <div class="absolute bottom-8 left-1/2 flex -translate-x-1/2 flex-col items-center gap-2">
    <span class="text-[0.55rem] font-semibold uppercase tracking-[0.32em] text-slate-600">Scroll</span>
    <div class="flex h-9 w-5 justify-center rounded-full border-2 border-white/15 pt-2">
      <div class="h-2.5 w-1 animate-bounce rounded-full bg-white/40"></div>
    </div>
  </div>
</section>
