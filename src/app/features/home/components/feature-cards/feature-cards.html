<section class="relative overflow-hidden bg-[#0a0b0f] px-4 py-20 md:px-10 md:py-28 lg:px-14 lg:py-32">
  <!-- Orbe decorativo -->
  <div class="pointer-events-none absolute -right-48 top-1/2 h-[32rem] w-[32rem] -translate-y-1/2 rounded-full bg-[#df3432]/5 blur-[160px]"></div>
  <div class="pointer-events-none absolute -left-48 bottom-0 h-[24rem] w-[24rem] rounded-full bg-[#6366f1]/5 blur-[120px]"></div>

  <div class="relative z-10 mx-auto w-full max-w-6xl">
    <!-- Header -->
    <div class="mb-14 max-w-2xl md:mb-18 lg:mb-20">
      <span class="inline-block rounded-full border border-white/10 bg-white/[0.03] px-4 py-1.5 text-[0.62rem] font-semibold uppercase tracking-[0.28em] text-[#6366f1] backdrop-blur-sm">
        Ecosistema Nexora
      </span>
      <h2
        class="mt-5 text-3xl font-bold leading-tight text-white md:text-4xl lg:text-[2.75rem]"
        style="font-family: 'Inter', sans-serif"
      >
        Todo lo que necesitas para
        <span class="bg-gradient-to-r from-[#df3432] to-[#6366f1] bg-clip-text text-transparent">potenciar</span>
        tu vida académica
      </h2>
      <p class="mt-3 max-w-lg text-sm leading-relaxed text-slate-400 md:text-base">
        Una plataforma unificada donde la investigación, la colaboración y el conocimiento convergen.
      </p>
    </div>

    <!-- Grid de cards -->
    <div class="grid grid-cols-1 gap-4 md:grid-cols-2 md:gap-5 lg:gap-6">
      @for (card of cards(); track card.id) {
        <div
          class="group relative cursor-pointer overflow-hidden rounded-3xl border transition-all duration-500 ease-out"
          [style.borderColor]="hoveredId() === card.id ? card.accentColor + '40' : 'rgba(255,255,255,0.06)'"
          [style.boxShadow]="hoveredId() === card.id ? '0 0 60px ' + card.accentColor + '15' : 'none'"
          (mouseenter)="onHover(card.id)"
          (mouseleave)="onHover(null)"
        >
          <!-- Glass surface -->
          <div
            class="relative z-10 flex flex-col gap-5 p-7 backdrop-blur-xl transition-all duration-500 md:p-8 lg:p-10"
            [style.background]="
              hoveredId() === card.id
                ? 'linear-gradient(135deg, rgba(255,255,255,0.06) 0%, rgba(255,255,255,0.02) 100%)'
                : 'linear-gradient(135deg, rgba(255,255,255,0.04) 0%, rgba(255,255,255,0.01) 100%)'
            "
            [style.transform]="hoveredId() === card.id ? 'scale(1.02)' : 'scale(1)'"
          >
            <!-- Corner glow -->
            <div
              class="pointer-events-none absolute -top-24 -right-24 h-48 w-48 rounded-full opacity-0 blur-[80px] transition-opacity duration-700"
              [style.background]="'radial-gradient(circle, ' + card.accentColor + '30, transparent)'"
              [class.opacity-100]="hoveredId() === card.id"
            ></div>

            <!-- Icon -->
            <div
              class="relative flex h-12 w-12 items-center justify-center rounded-2xl transition-all duration-500"
              [style.background]="hoveredId() === card.id ? card.accentColor + '20' : 'rgba(255,255,255,0.04)'"
              [style.color]="hoveredId() === card.id ? card.accentColor : '#64748b'"
            >
              <div class="h-6 w-6" [innerHTML]="card.icon"></div>
            </div>

            <!-- Text -->
            <div class="relative flex flex-col gap-2.5">
              <h3
                class="text-xl font-semibold leading-tight transition-colors duration-500 md:text-2xl"
                style="font-family: 'Inter', sans-serif"
                [style.color]="hoveredId() === card.id ? '#f1f5f9' : '#cbd5e1'"
              >
                {{ card.title }}
              </h3>
              <p
                class="max-w-md text-sm leading-relaxed transition-colors duration-500 md:text-[0.95rem]"
                [style.color]="hoveredId() === card.id ? '#94a3b8' : '#64748b'"
              >
                {{ card.description }}
              </p>
            </div>

            <!-- Indicator -->
            <div class="relative mt-1 flex items-center gap-2">
              <span
                class="text-[0.6rem] font-semibold uppercase tracking-[0.22em] transition-all duration-500"
                [style.color]="hoveredId() === card.id ? card.accentColor : 'transparent'"
              >
                Explorar
              </span>
              <svg
                xmlns="http://www.w3.org/2000/svg"
                fill="none"
                viewBox="0 0 24 24"
                stroke-width="2"
                stroke="currentColor"
                class="h-3 w-3 transition-all duration-500"
                [style.color]="hoveredId() === card.id ? card.accentColor : 'transparent'"
                [style.transform]="hoveredId() === card.id ? 'translateX(4px)' : 'translateX(0)'"
              >
                <path stroke-linecap="round" stroke-linejoin="round" d="M13.5 4.5L21 12m0 0l-7.5 7.5M21 12H3" />
              </svg>
            </div>
          </div>
        </div>
      }
    </div>
  </div>
</section>
