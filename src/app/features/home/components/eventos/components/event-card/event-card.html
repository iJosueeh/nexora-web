<div class="group relative overflow-hidden rounded-2xl border border-white/10 bg-white/5 transition-all duration-300 hover:border-[#df3432]/40 hover:bg-white/10">
  <div class="aspect-video w-full bg-zinc-800">
    <img [src]="event().image || 'assets/images/hero-bg.jpg'" class="h-full w-full object-cover opacity-60 transition-transform duration-500 group-hover:scale-110 group-hover:opacity-80" />
    <div class="absolute right-4 top-4 rounded-full bg-[#df3432] px-3 py-1 text-[0.6rem] font-bold uppercase tracking-widest text-white">
      {{ event().category }}
    </div>
  </div>

  <div class="p-5 space-y-4">
    <div class="space-y-1">
      <h3 class="text-lg font-bold text-white group-hover:text-[#df3432]">{{ event().title }}</h3>
      <p class="text-xs text-zinc-400 line-clamp-2">{{ event().description }}</p>
    </div>

    <div class="flex flex-col gap-2 border-t border-white/5 pt-4">
      <div class="flex items-center gap-2 text-xs text-zinc-500">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="h-4 w-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M6.75 3v2.25M17.25 3v2.25M3 18.75V7.5a2.25 2.25 0 0 1 2.25-2.25h13.5A2.25 2.25 0 0 1 21 7.5v11.25m-18 0A2.25 2.25 0 0 0 5.25 21h13.5A2.25 2.25 0 0 0 21 18.75m-18 0v-7.5A2.25 2.25 0 0 1 5.25 9h13.5A2.25 2.25 0 0 1 21 11.25v7.5" />
        </svg>
        {{ event().date }}
      </div>
      <div class="flex items-center gap-2 text-xs text-zinc-500">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="2" stroke="currentColor" class="h-4 w-4">
          <path stroke-linecap="round" stroke-linejoin="round" d="M15 10.5a3 3 0 1 1-6 0 3 3 0 0 1 6 0Z" />
          <path stroke-linecap="round" stroke-linejoin="round" d="M19.5 10.5c0 7.142-7.5 11.25-7.5 11.25S4.5 17.642 4.5 10.5a7.5 7.5 0 1 1 15 0Z" />
        </svg>
        {{ event().location }}
      </div>
    </div>

    <div class="flex flex-col space-y-3 pt-2">
      <div class="flex items-center justify-between">
        <span class="text-[0.65rem] font-medium text-zinc-500">{{ event().attendeesCount }} investigadores asistirán</span>
      </div>
      <div class="flex gap-2">
        <a [routerLink]="['/eventos', event().slug]" class="flex-1 text-center rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-[0.65rem] font-bold uppercase tracking-widest text-white transition-all hover:bg-white/10 hover:border-[#df3432]/40">
          Detalles
        </a>
        
        @if (!hasConfirmed()) {
          <button 
            (click)="confirmRSVP($event)"
            [disabled]="isSubmitting()"
            class="flex-1 rounded-lg bg-[#df3432] px-4 py-3 text-[0.65rem] font-black uppercase tracking-widest text-white transition-all hover:bg-[#b82b29] shadow-lg shadow-[#df3432]/10 flex items-center justify-center gap-2 disabled:opacity-50 disabled:cursor-not-allowed">
            @if (isSubmitting()) {
              <svg class="animate-spin h-3 w-3 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
            } @else {
              RSVP
            }
          </button>
        } @else {
          <div class="flex-1 rounded-lg bg-green-500/20 border border-green-500/30 text-green-500 px-4 py-3 text-[0.6rem] font-bold uppercase tracking-widest flex items-center justify-center gap-1.5 animate-pulse">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
              <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M5 13l4 4L19 7" />
            </svg>
            Listo
          </div>
        }
      </div>
    </div>
  </div>
</div>
