<div class="rounded-2xl border border-white/10 bg-[#0d0e12] p-6">
  <div class="flex items-center justify-between border-b border-white/5 pb-4">
    <h2 class="text-lg font-bold text-white">Crear Evento</h2>
    <button
      type="button"
      (click)="cancel()"
      class="rounded-lg p-2 text-zinc-400 transition-all hover:bg-white/10 hover:text-white"
      aria-label="Cerrar"
    >
      <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5" fill="none" viewBox="0 0 24 24" stroke="currentColor">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
      </svg>
    </button>
  </div>

  @if (error()) {
    <div class="mt-4 rounded-lg bg-red-500/10 border border-red-500/20 p-3 text-sm text-red-400">
      {{ error() }}
    </div>
  }

  <form (ngSubmit)="submit()" class="mt-6 space-y-6">
    <div class="space-y-5">
      <div class="space-y-1.5">
        <div class="flex items-center gap-2">
          <label for="title" class="text-xs font-semibold uppercase tracking-widest text-white">Título</label>
          <span class="rounded bg-[#df3432]/20 px-1.5 py-0.5 text-[0.6rem] font-bold text-[#df3432]">Obligatorio</span>
        </div>
        <input
          id="title"
          [ngModel]="title()"
          (ngModelChange)="title.set($event)"
          name="title"
          required
          placeholder="Ej: Taller de Investigación"
          class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder-zinc-500 outline-none transition-colors focus:border-[#df3432]/60 focus:ring-1 focus:ring-[#df3432]/20"
        />
      </div>

      <div class="space-y-1.5">
        <label for="description" class="text-xs font-semibold uppercase tracking-widest text-white/50">Descripción <span class="normal-case font-normal">(opcional)</span></label>
        <textarea
          id="description"
          [ngModel]="description()"
          (ngModelChange)="description.set($event)"
          name="description"
          rows="3"
          placeholder="Describe el evento..."
          class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder-zinc-500 outline-none transition-colors focus:border-[#df3432]/60 focus:ring-1 focus:ring-[#df3432]/20 resize-none"
        ></textarea>
      </div>

      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <div class="flex items-center gap-2">
            <label for="date" class="text-xs font-semibold uppercase tracking-widest text-white">Fecha</label>
            <span class="rounded bg-[#df3432]/20 px-1.5 py-0.5 text-[0.6rem] font-bold text-[#df3432]">Obligatorio</span>
          </div>
          <input
            id="date"
            [ngModel]="date()"
            (ngModelChange)="date.set($event)"
            name="date"
            type="datetime-local"
            required
            class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition-colors focus:border-[#df3432]/60 focus:ring-1 focus:ring-[#df3432]/20 [color-scheme:dark]"
          />
        </div>
        <div class="space-y-1.5">
          <label for="category" class="text-xs font-semibold uppercase tracking-widest text-white/50">Categoría <span class="normal-case font-normal">(opcional)</span></label>
          <select
            id="category"
            [ngModel]="category()"
            (ngModelChange)="category.set($event)"
            name="category"
            class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition-colors focus:border-[#df3432]/60 focus:ring-1 focus:ring-[#df3432]/20"
          >
            @for (cat of categories(); track cat) {
              <option [value]="cat" class="bg-zinc-900">{{ cat }}</option>
            }
          </select>
        </div>
      </div>

      <div class="space-y-1.5">
        <label for="location" class="text-xs font-semibold uppercase tracking-widest text-white/50">Ubicación <span class="normal-case font-normal">(opcional)</span></label>
        <div class="relative">
          <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-zinc-500" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"></path><circle cx="12" cy="10" r="3"></circle></svg>
          <input
            id="location"
            [ngModel]="location()"
            (ngModelChange)="location.set($event)"
            name="location"
            placeholder="Ej: Auditorio Principal UTP"
            class="w-full rounded-lg border border-white/10 bg-white/5 py-3 pl-10 pr-4 text-sm text-white placeholder-zinc-500 outline-none transition-colors focus:border-[#df3432]/60 focus:ring-1 focus:ring-[#df3432]/20"
          />
        </div>
      </div>

      <div class="space-y-1.5">
        <label for="image" class="text-xs font-semibold uppercase tracking-widest text-white/50">URL de Imagen <span class="normal-case font-normal">(opcional)</span></label>
        <div class="relative">
          <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-zinc-500" width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><rect x="3" y="3" width="18" height="18" rx="2" ry="2"></rect><circle cx="8.5" cy="8.5" r="1.5"></circle><polyline points="21 15 16 10 5 21"></polyline></svg>
          <input
            id="image"
            [ngModel]="image()"
            (ngModelChange)="image.set($event)"
            name="image"
            type="url"
            placeholder="https://..."
            class="w-full rounded-lg border border-white/10 bg-white/5 py-3 pl-10 pr-4 text-sm text-white placeholder-zinc-500 outline-none transition-colors focus:border-[#df3432]/60 focus:ring-1 focus:ring-[#df3432]/20"
          />
        </div>
      </div>
    </div>

    <div class="rounded-xl border border-white/5 bg-white/[0.02] p-4 space-y-4">
      <h3 class="text-[0.7rem] font-semibold uppercase tracking-widest text-white/40">Organizador</h3>
      <div class="grid grid-cols-2 gap-4">
        <div class="space-y-1.5">
          <label for="organizerName" class="text-xs font-medium text-white/70">Nombre <span class="normal-case font-normal">(opcional)</span></label>
          <input
            id="organizerName"
            [ngModel]="organizerName()"
            (ngModelChange)="organizerName.set($event)"
            name="organizerName"
            placeholder="Nombre del organizador"
            class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-white placeholder-zinc-500 outline-none transition-colors focus:border-[#df3432]/60 focus:ring-1 focus:ring-[#df3432]/20"
          />
        </div>
        <div class="space-y-1.5">
          <label for="organizerRole" class="text-xs font-medium text-white/70">Rol <span class="normal-case font-normal">(opcional)</span></label>
          <input
            id="organizerRole"
            [ngModel]="organizerRole()"
            (ngModelChange)="organizerRole.set($event)"
            name="organizerRole"
            placeholder="Ej: Coordinador"
            class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-2.5 text-sm text-white placeholder-zinc-500 outline-none transition-colors focus:border-[#df3432]/60 focus:ring-1 focus:ring-[#df3432]/20"
          />
        </div>
      </div>
    </div>

    <div class="rounded-xl border border-white/5 bg-white/[0.02] p-4 space-y-4">
      <h3 class="text-[0.7rem] font-semibold uppercase tracking-widest text-white/40">Links de Comunidad</h3>
      <div class="grid grid-cols-3 gap-3">
        <div class="space-y-1.5">
          <label for="whatsapp" class="flex items-center gap-1.5 text-xs font-medium text-white/70">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-green-400" viewBox="0 0 24 24" fill="currentColor"><path d="M17.472 14.382c-.297-.149-1.758-.867-2.03-.967-.273-.099-.471-.148-.67.15-.197.297-.767.966-.94 1.164-.173.199-.347.223-.644.075-.297-.15-1.255-.463-2.39-1.475-.883-.788-1.48-1.761-1.653-2.059-.173-.297-.018-.458.13-.606.134-.133.298-.347.446-.52.149-.174.198-.298.298-.497.099-.198.05-.371-.025-.52-.075-.149-.669-1.612-.916-2.207-.242-.579-.487-.5-.669-.51-.173-.008-.371-.01-.57-.01-.198 0-.52.074-.792.372-.272.297-1.04 1.016-1.04 2.479 0 1.462 1.065 2.875 1.213 3.074.149.198 2.096 3.2 5.077 4.487.709.306 1.262.489 1.694.625.712.227 1.36.195 1.871.118.571-.085 1.758-.719 2.006-1.413.248-.694.248-1.289.173-1.413-.074-.124-.272-.198-.57-.347m-5.421 7.403h-.004a9.87 9.87 0 01-5.031-1.378l-.361-.214-3.741.982.998-3.648-.235-.374a9.86 9.86 0 01-1.51-5.26c.001-5.45 4.436-9.884 9.888-9.884 2.64 0 5.122 1.03 6.988 2.898a9.825 9.825 0 012.893 6.994c-.003 5.45-4.437 9.884-9.885 9.884m8.413-18.297A11.815 11.815 0 0012.05 0C5.495 0 .16 5.335.157 11.892c0 2.096.547 4.142 1.588 5.945L.057 24l6.305-1.654a11.882 11.882 0 005.683 1.448h.005c6.554 0 11.89-5.335 11.893-11.893a11.821 11.821 0 00-3.48-8.413z"/></svg>
            WhatsApp
          </label>
          <input
            id="whatsapp"
            [ngModel]="whatsapp()"
            (ngModelChange)="whatsapp.set($event)"
            name="whatsapp"
            type="url"
            placeholder="https://..."
            class="w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-xs text-white placeholder-zinc-500 outline-none transition-colors focus:border-green-500/60 focus:ring-1 focus:ring-green-500/20"
          />
        </div>
        <div class="space-y-1.5">
          <label for="telegram" class="flex items-center gap-1.5 text-xs font-medium text-white/70">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-blue-400" viewBox="0 0 24 24" fill="currentColor"><path d="M11.944 0A12 12 0 0 0 0 12a12 12 0 0 0 12 12 12 12 0 0 0 12-12A12 12 0 0 0 12 0a12 12 0 0 0-.056 0zm4.962 7.224c.1-.002.321.023.465.14a.506.506 0 0 1 .171.325c.016.093.036.306.02.472-.18 1.898-.962 6.502-1.36 8.627-.168.9-.499 1.201-.82 1.23-.696.065-1.225-.46-1.9-.902-1.056-.693-1.653-1.124-2.678-1.8-1.185-.78-.417-1.21.258-1.91.177-.184 3.247-2.977 3.307-3.23.007-.032.014-.15-.056-.212s-.174-.041-.249-.024c-.106.024-1.793 1.14-5.061 3.345-.48.33-.913.49-1.302.48-.428-.008-1.252-.241-1.865-.44-.752-.245-1.349-.374-1.297-.789.027-.216.325-.437.893-.663 3.498-1.524 5.83-2.529 6.998-3.014 3.332-1.386 4.025-1.627 4.476-1.635z"/></svg>
            Telegram
          </label>
          <input
            id="telegram"
            [ngModel]="telegram()"
            (ngModelChange)="telegram.set($event)"
            name="telegram"
            type="url"
            placeholder="https://..."
            class="w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-xs text-white placeholder-zinc-500 outline-none transition-colors focus:border-blue-500/60 focus:ring-1 focus:ring-blue-500/20"
          />
        </div>
        <div class="space-y-1.5">
          <label for="discord" class="flex items-center gap-1.5 text-xs font-medium text-white/70">
            <svg xmlns="http://www.w3.org/2000/svg" class="h-3.5 w-3.5 text-[#5865F2]" viewBox="0 0 24 24" fill="currentColor"><path d="M20.317 4.3698a19.7913 19.7913 0 00-4.8851-1.5152.0741.0741 0 00-.0785.0371c-.211.3753-.4447.8648-.6083 1.2495-1.8447-.2762-3.68-.2762-5.4868 0-.1636-.3933-.4058-.8742-.6177-1.2495a.077.077 0 00-.0785-.037 19.7363 19.7363 0 00-4.8852 1.515.0699.0699 0 00-.0321.0277C.5334 9.0458-.319 13.5799.0992 18.0578a.0824.0824 0 00.0312.0561c2.0528 1.5076 4.0413 2.4228 5.9929 3.0294a.0777.0777 0 00.0842-.0276c.4616-.6304.8731-1.2952 1.226-1.9942a.076.076 0 00-.0416-.1057c-.6528-.2476-1.2743-.5495-1.8722-.8923a.077.077 0 01-.0076-.1277c.1258-.0943.2517-.1923.3718-.2914a.0743.0743 0 01.0776-.0105c3.9278 1.7933 8.18 1.7933 12.0614 0a.0739.0739 0 01.0785.0095c.1202.099.246.1981.3728.2924a.077.077 0 01-.0066.1276 12.2986 12.2986 0 01-1.873.8914.0766.0766 0 00-.0407.1067c.3604.698.7719 1.3628 1.225 1.9932a.076.076 0 00.0842.0286c1.961-.6067 3.9495-1.5219 6.0023-3.0294a.077.077 0 00.0313-.0552c.5004-5.177-.8382-9.6739-3.5485-13.6604a.061.061 0 00-.0312-.0286zM8.02 15.3312c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9555-2.4189 2.157-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.9555 2.4189-2.1569 2.4189zm7.9748 0c-1.1825 0-2.1569-1.0857-2.1569-2.419 0-1.3332.9554-2.4189 2.1569-2.4189 1.2108 0 2.1757 1.0952 2.1568 2.419 0 1.3332-.946 2.4189-2.1568 2.4189Z"/></svg>
            Discord
          </label>
          <input
            id="discord"
            [ngModel]="discord()"
            (ngModelChange)="discord.set($event)"
            name="discord"
            type="url"
            placeholder="https://..."
            class="w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-xs text-white placeholder-zinc-500 outline-none transition-colors focus:border-[#5865F2]/60 focus:ring-1 focus:ring-[#5865F2]/20"
          />
        </div>
      </div>
    </div>

    <div class="flex gap-3 pt-2">
      <button
        type="button"
        (click)="cancel()"
        class="flex-1 rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-sm font-semibold text-zinc-400 transition-all hover:bg-white/10 hover:text-white"
      >
        Cancelar
      </button>
      <button
        type="submit"
        [disabled]="isSubmitting()"
        class="flex-1 rounded-lg bg-gradient-to-br from-[#df3432] to-[#b82829] px-4 py-3 text-sm font-bold uppercase tracking-wider text-white shadow-lg shadow-[#df3432]/20 transition-all hover:shadow-[#df3432]/30 hover:brightness-110 disabled:opacity-50 disabled:cursor-not-allowed flex items-center justify-center gap-2"
      >
        @if (isSubmitting()) {
          <svg class="h-4 w-4 animate-spin text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
            <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
            <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
          </svg>
          <span>Creando...</span>
        } @else {
          Crear Evento
        }
      </button>
    </div>
  </form>
</div>
