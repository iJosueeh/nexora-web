<div class="glass-panel overflow-hidden rounded-2xl border border-white/[0.08] p-4 sm:p-5">
  <div class="flex flex-col gap-4 lg:flex-row lg:flex-wrap lg:items-end">
    <div class="flex items-center gap-2">
      <div class="flex h-7 w-7 items-center justify-center rounded-lg bg-[#df3432]/10">
        <svg xmlns="http://www.w3.org/2000/svg" class="h-4 w-4 text-[#df3432]" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M3 4a1 1 0 011-1h16a1 1 0 011 1v2.586a1 1 0 01-.293.707l-6.414 6.414a1 1 0 00-.293.707V17l-4 4v-6.586a1 1 0 00-.293-.707L3.293 7.293A1 1 0 013 6.586V4z" />
        </svg>
      </div>
      <h3 class="text-sm font-bold uppercase tracking-widest text-white/70">Filtros</h3>
    </div>

    <div class="w-full lg:w-auto lg:flex-1 lg:min-w-[200px]">
      <label class="mb-1.5 block text-[0.65rem] font-semibold uppercase tracking-wider text-white/40">Búsqueda</label>
      <div class="relative">
        <svg xmlns="http://www.w3.org/2000/svg" class="absolute left-3 top-1/2 h-4 w-4 -translate-y-1/2 text-white/30" fill="none" viewBox="0 0 24 24" stroke="currentColor" stroke-width="2">
          <path stroke-linecap="round" stroke-linejoin="round" d="M21 21l-6-6m2-5a7 7 0 11-14 0 7 7 0 0114 0z" />
        </svg>
        <input
          type="text"
          [ngModel]="filters().query"
          (ngModelChange)="update('query', $event)"
          placeholder="Buscar recurso..."
          class="w-full rounded-xl border border-white/[0.06] bg-white/[0.03] py-2.5 pl-10 pr-4 text-sm text-white placeholder-white/30 outline-none transition-all focus:border-[#df3432]/40 focus:bg-white/[0.05] focus:ring-2 focus:ring-[#df3432]/10"
        />
      </div>
    </div>

    <div class="w-full sm:w-auto lg:min-w-[160px]">
      <label class="mb-1.5 block text-[0.65rem] font-semibold uppercase tracking-wider text-white/40">Categoría</label>
      <select
        [ngModel]="filters().categoryId"
        (ngModelChange)="update('categoryId', $event || null)"
        class="w-full rounded-xl border border-white/[0.06] bg-white/[0.03] px-4 py-2.5 text-sm text-white outline-none transition-all focus:border-[#df3432]/40 focus:bg-white/[0.05] focus:ring-2 focus:ring-[#df3432]/10"
      >
        <option [value]="null" class="bg-zinc-900">Todas</option>
        @for (category of categories(); track category.id) {
          <option [value]="category.id" class="bg-zinc-900">{{ category.name }}</option>
        }
      </select>
    </div>

    <div class="w-full sm:w-auto lg:min-w-[140px]">
      <label class="mb-1.5 block text-[0.65rem] font-semibold uppercase tracking-wider text-white/40">Tipo</label>
      <select
        [ngModel]="filters().type"
        (ngModelChange)="update('type', $event || null)"
        class="w-full rounded-xl border border-white/[0.06] bg-white/[0.03] px-4 py-2.5 text-sm text-white outline-none transition-all focus:border-[#df3432]/40 focus:bg-white/[0.05] focus:ring-2 focus:ring-[#df3432]/10"
      >
        <option [value]="null" class="bg-zinc-900">Todos</option>
        @for (type of resourceTypes; track type) {
          <option [value]="type" class="bg-zinc-900">{{ resourceTypeLabels[type] }}</option>
        }
      </select>
    </div>

    <div class="w-full sm:w-auto">
      <label class="mb-1.5 block text-[0.65rem] font-semibold uppercase tracking-wider text-white/40">Rating mínimo</label>
      <div class="grid grid-cols-4 gap-2">
        @for (rating of ratingOptions; track rating) {
          <button
            type="button"
            (click)="update('minRating', rating === 0 ? null : rating)"
            [class]="filters().minRating === (rating === 0 ? null : rating) 
              ? 'bg-[#df3432] text-white border-[#df3432] shadow-lg shadow-[#df3432]/20' 
              : 'bg-white/[0.03] text-white/50 border-white/[0.06] hover:border-white/20 hover:text-white/70'"
            class="rounded-xl border py-2 text-xs font-semibold transition-all duration-200"
          >
            {{ rating === 0 ? 'Todos' : rating + '+' }}
          </button>
        }
      </div>
    </div>
  </div>
</div>
