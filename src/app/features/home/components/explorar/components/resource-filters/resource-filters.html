<div class="rounded-2xl border border-white/10 bg-white/5 p-5 space-y-4">
  <h3 class="text-sm font-bold uppercase tracking-widest text-zinc-400">Filtros</h3>

  <div class="space-y-1.5">
    <label class="text-xs font-semibold text-zinc-500">Búsqueda</label>
    <input
      type="text"
      [ngModel]="filters().query"
      (ngModelChange)="update('query', $event)"
      placeholder="Buscar recurso..."
      class="w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-white placeholder-zinc-600 outline-none focus:border-[#df3432]/60"
    />
  </div>

  <div class="space-y-1.5">
    <label class="text-xs font-semibold text-zinc-500">Categoría</label>
    <select
      [ngModel]="filters().categoryId"
      (ngModelChange)="update('categoryId', $event || null)"
      class="w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-white outline-none focus:border-[#df3432]/60"
    >
      <option [value]="null" class="bg-zinc-900">Todas</option>
      @for (category of categories(); track category.id) {
        <option [value]="category.id" class="bg-zinc-900">{{ category.name }}</option>
      }
    </select>
  </div>

  <div class="space-y-1.5">
    <label class="text-xs font-semibold text-zinc-500">Tipo</label>
    <select
      [ngModel]="filters().type"
      (ngModelChange)="update('type', $event || null)"
      class="w-full rounded-lg border border-white/10 bg-white/5 px-3 py-2 text-sm text-white outline-none focus:border-[#df3432]/60"
    >
      <option [value]="null" class="bg-zinc-900">Todos</option>
      @for (type of resourceTypes; track type) {
        <option [value]="type" class="bg-zinc-900">{{ resourceTypeLabels[type] }}</option>
      }
    </select>
  </div>

  <div class="space-y-1.5">
    <label class="text-xs font-semibold text-zinc-500">Rating mínimo</label>
    <div class="flex gap-2">
      @for (rating of ratingOptions; track rating) {
        <button
          type="button"
          (click)="update('minRating', rating === 0 ? null : rating)"
          [class]="filters().minRating === (rating === 0 ? null : rating) ? 'bg-[#df3432] text-white border-[#df3432]' : 'bg-white/5 text-zinc-400 border-white/10 hover:border-white/30'"
          class="flex-1 rounded-lg border py-2 text-xs font-semibold transition-all"
        >
          {{ rating === 0 ? 'Todos' : rating + '+' }}
        </button>
      }
    </div>
  </div>
</div>
