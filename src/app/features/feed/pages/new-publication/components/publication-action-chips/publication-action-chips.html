<div class="flex items-center gap-2 overflow-x-auto pb-1 scrollbar-hide">
  @for (action of actions; track action.id) {
    <button
      type="button"
      class="inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/5 py-1.5 px-4 text-sm text-white/70 transition-all hover:bg-white/10 hover:text-white"
      [class.border-[#df3432]/50]="activeActions().includes(action.id)"
      [class.bg-[#df3432]/15]="activeActions().includes(action.id)"
      [class.text-[#df3432]]="activeActions().includes(action.id)"
      (click)="toggleAction(action.id)"
    >
      <svg xmlns="http://www.w3.org/2000/svg" width="13" height="13" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path [attr.d]="action.iconPath"></path>
      </svg>
      <span>{{ action.label }}</span>
    </button>
  }
</div>
