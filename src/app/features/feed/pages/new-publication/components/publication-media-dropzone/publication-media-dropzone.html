<label
  class="group relative block cursor-pointer rounded-2xl border border-dashed border-white/10 bg-white/[0.02] p-8 text-center transition-all duration-300 hover:border-white/20 hover:bg-white/[0.05]"
  [class.ring-2]="isDragging()"
  [class.ring-[#df3432]/50]="isDragging()"
  [class.ring-offset-2]="isDragging()"
  [class.ring-offset-[#0c0c0c]]="isDragging()"
  (dragover)="onDragOver($event)"
  (dragleave)="onDragLeave($event)"
  (drop)="onDrop($event)"
  for="publication-media-upload"
>
  <input
    id="publication-media-upload"
    type="file"
    class="sr-only"
    multiple
    accept="image/*,application/pdf"
    (change)="onFileChange($event)"
  />

  @if (isUploading()) {
    <div class="flex flex-col items-center justify-center">
      <svg
        class="h-10 w-10 animate-spin text-[#df3432]"
        xmlns="http://www.w3.org/2000/svg"
        fill="none"
        viewBox="0 0 24 24"
        aria-hidden="true"
      >
        <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
        <path
          class="opacity-75"
          fill="currentColor"
          d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"
        ></path>
      </svg>
      <p class="mt-4 text-sm font-medium text-white/60">Subiendo archivos...</p>
    </div>
  } @else {
    <div class="flex flex-col items-center justify-center">
      <div
        class="mx-auto flex h-14 w-14 items-center justify-center rounded-xl border border-white/10 bg-white/5 text-[#df3432] transition-all duration-300 group-hover:scale-110 group-hover:border-white/20"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          width="24"
          height="24"
          viewBox="0 0 24 24"
          fill="none"
          stroke="currentColor"
          stroke-width="1.9"
          stroke-linecap="round"
          stroke-linejoin="round"
          aria-hidden="true"
        >
          <path d="M12 16V4"></path>
          <path d="m7 9 5-5 5 5"></path>
          <path d="M20 16.5V19a2 2 0 0 1-2 2H6a2 2 0 0 1-2-2v-2.5"></path>
        </svg>
      </div>

      <h3 class="mt-5 text-sm font-semibold uppercase tracking-[0.14em] text-white/70 transition-colors group-hover:text-white">
        Subir Multimedia
      </h3>
      <p class="mt-2 text-[11px] leading-5 text-white/40">
        {{ fileSummary() }}
      </p>

      @if (!files().length) {
        <p class="mt-2 text-[10px] uppercase tracking-[0.12em] text-white/25">
          Imágenes, presentaciones o documentos PDF
        </p>
      }
    </div>
  }
</label>

@if (files().length) {
  <div class="mt-3 flex flex-wrap gap-2">
    @for (file of files(); track file.name) {
      <button
        type="button"
        class="inline-flex items-center gap-2 rounded-full border border-white/10 bg-white/5 px-3 py-2 text-[11px] text-white/70 transition-all hover:border-[#df3432]/50 hover:bg-[#df3432]/15 hover:text-[#df3432]"
        (click)="removeFile($index)"
      >
        <span class="max-w-36 truncate">{{ file.name }}</span>
        <span class="text-[10px] uppercase tracking-[0.12em] text-white/40">x</span>
      </button>
    }
  </div>
}
