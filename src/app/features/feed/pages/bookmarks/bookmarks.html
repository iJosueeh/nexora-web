<div class="mx-auto max-w-2xl px-4 py-8">
  <header class="mb-8">
    <h1 class="text-2xl font-bold text-white">Guardados</h1>
    <p class="mt-1 text-sm text-white/50">Publicaciones que guardaste para consultar después</p>
  </header>

  @if (isLoading()) {
    <div class="flex justify-center py-12">
      <app-loading />
    </div>
  } @else if (bookmarks().length === 0) {
    <div class="rounded-2xl border border-white/5 bg-white/[0.03] p-12 text-center">
      <svg xmlns="http://www.w3.org/2000/svg" class="mx-auto mb-4 h-12 w-12 text-white/20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path>
      </svg>
      <p class="text-white/40">No guardaste ninguna publicación aún</p>
      <a routerLink="/feed" class="mt-4 inline-block text-sm font-semibold text-[#df3432] hover:underline">
        Explorar el feed
      </a>
    </div>
  } @else {
    <div class="space-y-4">
      @for (post of bookmarks(); track post.id) {
        <app-post-card [post]="post" (deleted)="onPostDeleted($event)" />
      }
    </div>
  }
</div>
