<main class="w-full rounded-2xl bg-[#0d0e12]">
      <div class="px-4 py-6 sm:px-6">
        <header class="mb-8">
          <div class="flex items-center gap-3 mb-2">
            <div class="flex h-10 w-10 items-center justify-center rounded-xl bg-[#df3432]/10">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-5 w-5 text-[#df3432]" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
                <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path>
              </svg>
            </div>
            <div>
              <h1 class="text-2xl font-bold tracking-tight text-white">Guardados</h1>
              <p class="text-sm text-white/50">Publicaciones que guardaste para consultar después</p>
            </div>
          </div>
        </header>

        @if (isLoading()) {
          <div class="space-y-4">
            @for (_ of [1,2,3]; track _) {
              <div class="skeleton-card">
                <div class="skeleton-row">
                  <div class="skeleton-avatar"></div>
                  <div class="skeleton-lines">
                    <div class="skeleton-line w-1/3"></div>
                    <div class="skeleton-line-sm w-1/4"></div>
                  </div>
                </div>
                <div class="skeleton-line w-3/4 mb-3"></div>
                <div class="skeleton-line w-full mb-2"></div>
                <div class="skeleton-line w-5/6 mb-3"></div>
                <div class="skeleton-block mb-2"></div>
                <div class="skeleton-bar">
                  <div class="skeleton-icon"></div>
                  <div class="skeleton-icon"></div>
                  <div class="skeleton-icon"></div>
                </div>
              </div>
            }
          </div>
        } @else if (bookmarks().length === 0) {
          <div class="rounded-2xl border border-white/5 bg-white/[0.02] p-12 text-center">
            <div class="mx-auto mb-4 flex h-16 w-16 items-center justify-center rounded-2xl bg-[#df3432]/5">
              <svg xmlns="http://www.w3.org/2000/svg" class="h-8 w-8 text-[#df3432]/40" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round">
                <path d="m19 21-7-4-7 4V5a2 2 0 0 1 2-2h10a2 2 0 0 1 2 2v16z"></path>
              </svg>
            </div>
            <p class="text-white/40 mb-4">No guardaste ninguna publicación aún</p>
            <a routerLink="/feed" class="inline-block rounded-xl bg-[#df3432] px-5 py-2.5 text-sm font-semibold text-white transition-all duration-200 hover:shadow-[0_0_15px_rgba(223,52,50,0.35)]">
              Explorar el feed
            </a>
          </div>
        } @else {
          <div class="space-y-4">
            @for (post of bookmarks(); track post.id) {
              <app-post-card [post]="post" (deleted)="onPostDeleted($event)" />
            }
          </div>

          @if (hasMore()) {
            <div class="flex justify-center pt-6 pb-4">
              <button
                type="button"
                (click)="loadMore()"
                [disabled]="isLoadingMore()"
                class="rounded-xl border border-white/5 bg-white/5 px-5 py-2.5 text-sm font-semibold text-white/70 transition-all duration-200 hover:bg-white/10 hover:border-white/10 hover:text-white disabled:cursor-not-allowed disabled:opacity-40"
              >
                {{ isLoadingMore() ? 'Cargando...' : 'Cargar más guardados' }}
              </button>
            </div>
          }
        }
      </div>
    </main>
