<app-shell-layout mode="feed" [showRight]="state.showRight()">
  <div shell-left>
    <app-feed-sidebar></app-feed-sidebar>
  </div>

  <div shell-main class="bg-[#06080d] relative min-h-0">
    <router-outlet />

    @if (loading()) {
      <div class="skeleton-mask">
        <div class="skeleton-card">
          <div class="skeleton-line w-3/4"></div>
          <div class="skeleton-line w-full"></div>
          <div class="skeleton-line w-5/6"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-line w-2/3"></div>
          <div class="skeleton-line w-full"></div>
          <div class="skeleton-line w-1/2"></div>
        </div>
        <div class="skeleton-card">
          <div class="skeleton-line w-3/4"></div>
          <div class="skeleton-line w-full"></div>
          <div class="skeleton-line w-4/5"></div>
        </div>
      </div>
    }
  </div>

  @if (state.showRight()) {
    <div shell-right>
      <app-feed-trends></app-feed-trends>
    </div>
  }
</app-shell-layout>
