<div class="rounded-2xl border border-white/10 bg-white/5 p-6 space-y-6">
  <h2 class="text-lg font-bold text-white">Crear nuevo grupo</h2>

  @if (error()) {
    <div class="rounded-lg bg-red-500/10 border border-red-500/20 px-4 py-3 text-sm text-red-400">
      {{ error() }}
    </div>
  }

  <div class="space-y-4">
    <div>
      <label class="mb-1.5 block text-xs font-semibold uppercase tracking-widest text-zinc-400">Nombre *</label>
      <input
        type="text"
        [ngModel]="name()"
        (ngModelChange)="name.set($event)"
        placeholder="Ej: Grupo de Cálculo"
        maxlength="100"
        class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder-zinc-500 outline-none transition-colors focus:border-[#df3432]/60"
      />
    </div>

    <div>
      <label class="mb-1.5 block text-xs font-semibold uppercase tracking-widest text-zinc-400">Descripción</label>
      <textarea
        [ngModel]="description()"
        (ngModelChange)="description.set($event)"
        placeholder="Describe el propósito del grupo..."
        rows="3"
        class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-sm text-white placeholder-zinc-500 outline-none transition-colors focus:border-[#df3432]/60 resize-none"
      ></textarea>
    </div>

    <div class="grid grid-cols-2 gap-4">
      <div>
        <label class="mb-1.5 block text-xs font-semibold uppercase tracking-widest text-zinc-400">Categoría</label>
        <select
          [ngModel]="category()"
          (ngModelChange)="category.set($event)"
          class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition-colors focus:border-[#df3432]/60"
        >
          @for (cat of categories(); track cat) {
            <option [value]="cat">{{ cat }}</option>
          }
        </select>
      </div>

      <div>
        <label class="mb-1.5 block text-xs font-semibold uppercase tracking-widest text-zinc-400">Máximo miembros</label>
        <input
          type="number"
          [ngModel]="maxMembers()"
          (ngModelChange)="maxMembers.set($event)"
          min="2"
          max="100"
          class="w-full rounded-lg border border-white/10 bg-white/5 px-4 py-3 text-sm text-white outline-none transition-colors focus:border-[#df3432]/60"
        />
      </div>
    </div>

    <div class="flex items-center gap-3">
      <input
        type="checkbox"
        [ngModel]="isPrivate()"
        (ngModelChange)="isPrivate.set($event)"
        id="isPrivate"
        class="h-4 w-4 rounded border-white/20 bg-white/5 text-[#df3432] focus:ring-[#df3432]/50"
      />
      <label for="isPrivate" class="text-sm text-white/60">Grupo privado (requiere aprobación para unirse)</label>
    </div>
  </div>

  <div class="flex items-center gap-3 pt-2">
    <button
      type="button"
      (click)="cancel()"
      class="rounded-xl border border-white/10 bg-white/5 px-5 py-2.5 text-sm font-semibold text-white/60 transition-all duration-200 hover:border-white/20 hover:bg-white/10 hover:text-white"
    >
      Cancelar
    </button>
    <button
      type="button"
      (click)="submit()"
      [disabled]="isSubmitting()"
      class="rounded-xl bg-gradient-to-br from-[#df3432] to-[#b82829] px-6 py-2.5 text-sm font-bold text-white shadow-[0_0_15px_rgba(223,52,50,0.3)] transition-all duration-200 hover:shadow-[0_0_20px_rgba(223,52,50,0.45)] hover:brightness-110 active:scale-[0.97] disabled:opacity-50"
    >
      @if (isSubmitting()) {
        <span class="inline-block h-4 w-4 animate-spin rounded-full border-2 border-white/20 border-t-white"></span>
      } @else {
        Crear Grupo
      }
    </button>
  </div>
</div>
