<div class="min-h-screen bg-[#0d0d0d] flex flex-col">
  <app-navbar></app-navbar>

  <main class="flex-1 flex items-center px-16 pt-20 pb-12 md:pt-24 md:pb-16 relative overflow-hidden">
    <div class="flex flex-col gap-6 max-w-lg z-10">
      <h1
        class="text-[9rem] font-black leading-none text-[#c0392b]"
        style="font-family: 'Inter', sans-serif; text-shadow: 0 0 80px rgba(192, 57, 43, 0.3)"
      >
        404
      </h1>

      <h2
        class="text-[2.4rem] font-bold text-white leading-tight"
        style="font-family: 'Inter', sans-serif"
      >
        Página no existente
      </h2>

      <!-- Description -->
      <p class="text-gray-400 text-base leading-relaxed max-w-sm">
        Parece que este rastro de conocimiento aún no ha sido escrito. No permitas que tu
        investigación se detenga aquí.
      </p>

      <!-- CTA Button -->
      <a
        routerLink="/home"
        class="inline-flex items-center gap-2 self-start bg-[#c0392b] hover:bg-[#e74c3c] text-white text-xs font-bold tracking-[0.12em] uppercase px-6 py-4 rounded-lg transition-colors duration-200 cursor-pointer"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="currentColor"
          class="w-4 h-4"
        >
          <path
            d="M11.7 2.805a.75.75 0 01.6 0A60.65 60.65 0 0122.83 8.72a.75.75 0 01-.231 1.337 49.949 49.949 0 00-9.902 3.912l-.003.002-.34.18a.75.75 0 01-.707 0A50.009 50.009 0 007.5 12.174v-.224c0-.131.067-.248.172-.311a54.614 54.614 0 014.653-2.52.75.75 0 00-.65-1.352 56.129 56.129 0 00-4.78 2.589 1.858 1.858 0 00-.859 1.228 49.803 49.803 0 00-4.634-1.527.75.75 0 01-.231-1.337A60.653 60.653 0 0111.7 2.805z"

          />
        </svg>
        Volver a la página principal
      </a>
    </div>

    <!-- Right: illustration card -->
    <div class="ml-auto relative z-10">
      <!-- Floating no-entry icon -->
      <div
        class="absolute -top-4 -right-4 w-12 h-12 rounded-full bg-[#1a1a1a] border border-white/8 flex items-center justify-center z-20"
      >
        <svg
          xmlns="http://www.w3.org/2000/svg"
          fill="none"
          viewBox="0 0 24 24"
          stroke-width="1.8"
          stroke="#c0392b"
          class="w-6 h-6"
        >
          <path
            stroke-linecap="round"
            stroke-linejoin="round"
            d="M18.364 18.364A9 9 0 005.636 5.636m12.728 12.728A9 9 0 015.636 5.636m12.728 12.728L5.636 5.636"
          />
        </svg>
      </div>

      <!-- Card -->
      <div
        class="w-75 h-90 rounded-2xl flex flex-col items-center justify-center gap-6 border border-white/[0.07]"
        style="
          background: radial-gradient(ellipse at 50% 30%, rgba(192, 57, 43, 0.12) 0%, #111111 70%);
        "
      >
        <!-- Book icon -->
        <svg
          xmlns="http://www.w3.org/2000/svg"
          viewBox="0 0 24 24"
          fill="#c0392b"
          class="w-20 h-20 opacity-90"
        >
          <path
            d="M11.25 4.533A9.707 9.707 0 006 3a9.735 9.735 0 00-3.25.555.75.75 0 00-.5.707v14.25a.75.75 0 001 .707A8.237 8.237 0 016 18.75c1.995 0 3.823.707 5.25 1.886V4.533zM12.75 20.636A8.214 8.214 0 0118 18.75c.966 0 1.89.166 2.75.47a.75.75 0 001-.708V4.262a.75.75 0 00-.5-.707A9.735 9.735 0 0018 3a9.707 9.707 0 00-5.25 1.533v16.103z"
          />
        </svg>

        <!-- Lines decoration -->
        <div class="flex flex-col gap-2 w-32">
          <div class="h-0.75 rounded-full bg-white/12"></div>
          <div class="h-0.75 rounded-full bg-white/8 w-3/4"></div>
        </div>
      </div>
    </div>

    <!-- Background glow -->
    <div
      class="absolute left-0 top-1/2 -translate-y-1/2 w-125 h-125 rounded-full pointer-events-none"
      style="background: radial-gradient(circle, rgba(192, 57, 43, 0.06) 0%, transparent 70%)"
    ></div>
  </main>

  <footer class="text-center pb-8">
    <p class="text-gray-600 text-sm italic">
      "No todos los que vagan están perdidos, pero esta página sin duda lo está."
    </p>
  </footer>
</div>
