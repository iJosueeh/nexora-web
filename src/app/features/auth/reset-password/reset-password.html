<div class="min-h-screen flex flex-col items-center justify-center overflow-hidden bg-[#08090f] px-4 py-8 relative md:px-6 lg:px-8">
  <div class="absolute inset-0 bg-cover bg-center bg-no-repeat opacity-20" style="background-image: url('/assets/images/bg-login.webp');"></div>
  <div class="absolute inset-0 pointer-events-none" style="background: radial-gradient(ellipse 75% 90% at 35% 45%, rgba(10,12,18,0.92) 0%, rgba(6,8,13,0.98) 65%, transparent 100%);"></div>

  <div class="relative z-10 w-full max-w-sm md:max-w-md grid gap-6 md:gap-7">
    <div class="grid gap-1.5">
      <h2 class="text-2xl md:text-3xl font-semibold text-[#f2f4f8]" style="font-family: 'Inter', sans-serif; line-height: 1.2;">
        Nueva contrasena
      </h2>
      <p class="text-[#8f95a3] text-xs md:text-sm">
        Crea una contrasena nueva para acceder nuevamente a tu cuenta.
      </p>
    </div>

    <div class="grid gap-4" [hidden]="canReset">
        <div class="grid gap-2">
          <label for="reset-email" class="text-[0.6rem] md:text-[0.65rem] font-semibold tracking-[0.12em] uppercase text-[#8f95a3]">
            Correo
          </label>
          <div class="flex items-center gap-3 bg-[#0f1219] border border-white/10 rounded-xl px-3.5 py-3 transition-all duration-200 focus-within:border-white/25 focus-within:bg-[#131820]">
            <input
              id="reset-email"
              type="email"
              placeholder="usuario@utp.edu.pe"
              [(ngModel)]="email"
              class="flex-1 bg-transparent text-xs md:text-sm text-[#d6dbe4] placeholder-[#5a6270] outline-none"
            />
          </div>
        </div>

        <div class="grid gap-2">
          <label for="reset-otp" class="text-[0.6rem] md:text-[0.65rem] font-semibold tracking-[0.12em] uppercase text-[#8f95a3]">
            Codigo de recuperacion
          </label>
          <div class="flex items-center gap-3 bg-[#0f1219] border border-white/10 rounded-xl px-3.5 py-3 transition-all duration-200 focus-within:border-white/25 focus-within:bg-[#131820]">
            <input
              id="reset-otp"
              type="text"
              inputmode="numeric"
              maxlength="8"
              placeholder="Codigo de 6 a 8 digitos"
              [(ngModel)]="otpCode"
              class="flex-1 bg-transparent text-xs md:text-sm text-[#d6dbe4] placeholder-[#5a6270] outline-none"
            />
          </div>
        </div>

        <button
          type="button"
          (click)="onVerifyRecoveryCode()"
          class="w-full flex items-center justify-center gap-2 bg-[#df3432] hover:bg-[#ee4542] disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold text-xs md:text-sm tracking-[0.12em] uppercase py-3.5 md:py-4 rounded-xl transition-colors duration-200"
        >
          Verificar codigo y continuar
        </button>

        <button
          type="button"
          (click)="onResendRecoveryCode()"
          [disabled]="isSendingCode"
          class="w-full border border-white/15 text-[#d6dbe4] text-xs md:text-sm font-semibold uppercase tracking-[0.08em] rounded-xl py-3 transition-all duration-200 hover:border-white/30 disabled:opacity-50 disabled:cursor-not-allowed"
        >
          @if (isSendingCode) {
            Reenviando...
          } @else {
            Reenviar codigo
          }
        </button>

        <a
          routerLink="/forgot-password"
          class="inline-flex justify-center rounded-xl border border-white/15 text-[#d6dbe4] text-xs md:text-sm font-semibold uppercase tracking-[0.08em] py-3 transition-all duration-200 hover:border-white/30"
        >
          Solicitar nuevo enlace
        </a>
      </div>

      <div class="grid gap-4" [hidden]="!canReset">
        <div class="grid gap-2">
          <label for="new-password" class="text-[0.6rem] md:text-[0.65rem] font-semibold tracking-[0.12em] uppercase text-[#8f95a3]">
            Contrasena nueva
          </label>
          <div class="flex items-center gap-3 bg-[#0f1219] border border-white/10 rounded-xl px-3.5 py-3 transition-all duration-200 focus-within:border-white/25 focus-within:bg-[#131820]">
            <input
              id="new-password"
              [type]="showPassword ? 'text' : 'password'"
              placeholder="Minimo 8 caracteres"
              [(ngModel)]="password"
              class="flex-1 bg-transparent text-xs md:text-sm text-[#d6dbe4] placeholder-[#5a6270] outline-none"
            />
            <button type="button" (click)="showPassword = !showPassword" class="text-[#8f95a3] text-[0.65rem] font-semibold uppercase tracking-widest">
              {{ showPassword ? 'Ocultar' : 'Mostrar' }}
            </button>
          </div>
        </div>

        <div class="grid gap-2">
          <label for="confirm-password" class="text-[0.6rem] md:text-[0.65rem] font-semibold tracking-[0.12em] uppercase text-[#8f95a3]">
            Confirmar contrasena
          </label>
          <div class="flex items-center gap-3 bg-[#0f1219] border border-white/10 rounded-xl px-3.5 py-3 transition-all duration-200 focus-within:border-white/25 focus-within:bg-[#131820]">
            <input
              id="confirm-password"
              [type]="showConfirmPassword ? 'text' : 'password'"
              placeholder="Repite tu contrasena"
              [(ngModel)]="confirmPassword"
              class="flex-1 bg-transparent text-xs md:text-sm text-[#d6dbe4] placeholder-[#5a6270] outline-none"
            />
            <button type="button" (click)="showConfirmPassword = !showConfirmPassword" class="text-[#8f95a3] text-[0.65rem] font-semibold uppercase tracking-widest">
              {{ showConfirmPassword ? 'Ocultar' : 'Mostrar' }}
            </button>
          </div>
        </div>

        <button
          type="button"
          (click)="onSubmit()"
          [disabled]="isSubmitting"
          class="w-full flex items-center justify-center gap-2 bg-[#df3432] hover:bg-[#ee4542] disabled:opacity-50 disabled:cursor-not-allowed text-white font-bold text-xs md:text-sm tracking-[0.12em] uppercase py-3.5 md:py-4 rounded-xl transition-colors duration-200"
        >
          @if (isSubmitting) {
            Guardando...
          } @else {
            Actualizar contrasena
          }
        </button>
      </div>
    </div>
</div>
